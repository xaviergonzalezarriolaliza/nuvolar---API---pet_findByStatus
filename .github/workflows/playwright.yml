name: API Tests

on:
  push:
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.yml'
      - '**/*.yaml'
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.yml'
      - '**/*.yaml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test tests/findPetsByStatus.spec.ts